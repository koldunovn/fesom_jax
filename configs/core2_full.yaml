# CORE2 (~1°, 127 k nodes) — the mean-state fidelity flagship (model-paper R1: 1958-2020 hindcast).
# This is the JAX all-on REFERENCE; the matched-Fortran run (R2) is configured to MATCH this config
# (docs/CORE2_FORTRAN_SPEC.md), and the comparison is statistical (climatology), never pointwise.
#
# Physics = the established all-on CORE2 (zstar + TKE + mEVP + GM, tracer (0,1)) — the same config the
# JAMES-paper sensitivity/calibration work ran on. The matched-Fortran namelist.oce (R2) mirrors these:
# GM k_gm/Redi from the JAX gm defaults, cvmix_TKE, whichEVP=mEVP, opt_visc=7, tracer adv (0,1).

ale: {}            # zstar vertical coordinate
gm: {}             # GM on (CORE2 ~1° needs the mesoscale-eddy parameterization)
                   # TODO: confirm k_gm / Redi_Kmax against the matched-Fortran namelist.oce
kpp: null          # vertical mixing: the existing JAX CORE2 used TKE — TODO confirm KPP vs TKE
tke: {}            # classical-TKE prognostic mixing (the JAMES-paper all-on default)
ice: {whichEVP: 1}  # mEVP sea-ice rheology (Bouillon 2013). whichEVP=1 = mEVP; the default 0 is
                    # STANDARD EVP. Matches the validated JAMES all-on run IceConfig(whichEVP=1)
                    # (core2_kpp_climate_run.py:268); ice_dt stays the 500 default as those runs used.

visc: {}           # CORE2 default γ's (gamma1 = 0.1)

tracer: {}         # ⚠️ TODO: confirm CORE2's num_ord/scheme == the implemented (0,1);
                   #     if not, this needs a kernel change (new reconstruction), not a toggle.

dt: 1800.0         # CORE2 timestep [s] (127 k / 48 levels)

# --- run orchestration (defaults; the hindcast sbatch overrides mesh/partition/steps/restart via CLI) ---
mesh: data/mesh_core2     # the staged CORE2 mesh (proven by run_core2_e2e)
partition: dist_4         # CORE2 ANTI-scales past 4 GPU (halo-bound) ⇒ dist_4 / 1 node is OPTIMAL
forcing:
  kind: core2
  start_year: 1958
output_dir: /work/ab0995/a270088/port_jax/runs/core2
snapshot_every: 48        # steps (~1/day at dt=1800)
checkpoint_every: 1440    # steps (~1 month)
restart_in: null
restart_out: /work/ab0995/a270088/port_jax/runs/core2/restart
duration: 10yr            # overridden by --steps (the per-job budget) from run_core2_hindcast.sbatch
