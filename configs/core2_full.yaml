# CORE2 (~1°, 127 k nodes) — the mean-state fidelity flagship.
# Reuse the existing 5-yr spin-up + 10-yr reference; the matched-Fortran comparison is statistical.
#
# ⚠️ PLACEHOLDER — the exact CORE2 matched-Fortran PHYSICS config is an OPEN ITEM (confirm with the
# user before the CORE2 Fortran run): GM on + its viscosity + its tracer num_ord/scheme vs the
# implemented (0,1). If CORE2's num_ord differs from (0,1), the tracer selector becomes a KERNEL
